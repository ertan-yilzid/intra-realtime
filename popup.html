<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>INTRA Log Update</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>INTRA LOG UPDATE</h1>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">ON/OFF</span>
      <label class="switch">
        <input type="checkbox" id="toggle" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="settings-section">
      <label for="required-hours" class="setting-label">Required Hours:</label>
      <div class="hours-input-group">
        <input type="number" id="required-hours" min="1" max="100" value="30">
        <span class="hours-unit">h</span>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
